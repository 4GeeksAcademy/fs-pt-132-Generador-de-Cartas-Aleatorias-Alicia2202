<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de cartas aleatorio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-success d-flex justify-content-center align-items-center vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-3 col-md-4 col-sm-6 d-flex flex-column align-items-center">
        <div id="myCard" class="card poker-card shadow-lg position-relative">
          <!-- HEADER -->
          <div class="card-header-custom d-flex align-items-start p-3" style="height: 30%;">

            <span id="top-suit" class="suit"></span>

          </div>

          <!-- BODY -->

          <div class="card-body-custom d-flex justify-content-center align-items-center flex-grow-1">
            <span id="value-card" class="display-1 fw-bold" style="font-size: 10rem;"></span>
          </div>

          <!-- FOOTER -->
          <div class="card-footer-custom d-flex justify-content-end align-items-end p-3">
            <div class="d-flex flex-column rotate-180">
              <span id="bottom-suit" class="suit"></span>
            </div>
          </div>


        </div>
        <div class="mt-3 w-100 text-center">
          <button id="new-card-btn" class="btn mb-3"><b>New Card</b></button>
        </div>
        <div class="row mt-2 g-2 justify-content-center">
          <div class="col-lg-5 col-md-6 col-sm-8">
            <input type="number" id="width-input" class="form-control" placeholder="Width" min="353">
          </div>
          <div class="col-lg-5 col-md-6 col-sm-8">
            <input type="number" id="height-input" class="form-control"  placeholder="Height" min="458">
          </div>
        </div>
        <div col-auto>
          <button id="reset-btn" class="btn mt-2 mb-2 w-100">
            <i class="fa-solid fa-arrow-rotate-left"></i>
          </button>
        </div>
      </div>
    </div>
  </div>


  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
